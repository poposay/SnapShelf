<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>カテゴリ管理</title>
	<link rel="stylesheet" href="/css/common.css">
	<link rel="stylesheet" href="/css/category.css">
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

	<script src="https://unpkg.com/vue@3"></script>
	<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>

<body>
	<div id="app" v-cloak>
		<div th:replace="fragments/header :: header"></div>
		<div class="main-layout">
			<aside class="sidebar">
				<div th:replace="fragments/sidebar :: sidebar"></div>
			</aside>

			<div class="content">
				<div class="container--wide">
					<h2>カテゴリ一覧</h2>
					<div class="btn-container">
						<p><a href="/home" class="btn btn-cancel">戻る</a></p>
						<p><a href="/categorycreate" class="btn">新規登録</a></p>
					</div>
					<div v-if="categories.length === 0">
						<p>登録されているカテゴリがありません</p>
					</div>
					<table v-if="categories.length > 0">
						<tr>
							<th>ID</th>
							<th>カテゴリ名</th>
							<th>作成日</th>
							<th>操作</th>
						</tr>
						<tr v-for="category in categories" :key="category.id">
							<td>{{ category.id }}</td>
							<td>{{ category.categoryName }}</td>
							<td>{{ category.createdAt }}</td>
							<td>
								<a :href="'/categoryedit/' + category.id" class="btn btn-category">編集</a>
								<button @click="openDeleteModal(category.id)" class="btn btn-delete btn-category">削除</button>
							</td>
						</tr>
					</table>
				</div>
			</div>

			<!-- モーダル -->
			<!-- オーバーレイ -->
			<div v-if="showDeleteModal" class="modal-overlay"></div>

			<!-- モーダル本体 -->
			<div v-if="showDeleteModal" class="modal-custom">
				<p>カテゴリを削除します。<br>よろしいですか？</p>
				<div class="modal-button-group">
					<button @click="deleteCategory" class="modalbtn">OK</button>
					<button @click="showDeleteModal=false" class="modalbtn">キャンセル</button>
				</div>
			</div>
			<Transition name="fade">
				<div v-if="showDialog" class="dialog-bar">
					<p>削除が完了しました。</p>
					<button @click="closeDialog">閉じる</button>
				</div>		
			</Transition>

		</div>
	</div>
		<script th:inline="javascript">
			Vue.createApp({
				data() {
					return {
						categoryId: null,
						categories: [],
						showDialog: false,
						showDeleteModal: false,
					};
				},
				mounted() {
					const json = /*[[${categoriesJson}]]*/ '[]';
					this.categories = JSON.parse(json);
					console.log(this.categories)
				},
				methods: {
					openDeleteModal(id) {
						this.categoryId = id;
						this.showDeleteModal = true;
					},
					deleteCategory() {
						console.log("fetchCategory呼び出し")
						axios.delete(`/categorydelete/${this.categoryId}`)
							.then(response => {
								this.categories = this.categories.filter(c => c.id !== this.categoryId);
								this.showDeleteModal = false;
								this.showDialog = true;
								setTimeout(() => {
								    this.showDialog = false;
								}, 3000);
							})
							.catch(error => {
								console.error("削除失敗", error);
							});
					},

					closeDialog() {
						this.showDialog = false;
					}
				}
			}).mount('#app')
		</script>
</body>

</html>
